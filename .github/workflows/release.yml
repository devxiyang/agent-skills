name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Update README skills table
        run: node scripts/update-readme.mjs

      - name: Commit README if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update skills table [skip ci]"
            git push
          fi

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Zip and upload skills
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for dir in */; do
            name="${dir%/}"
            if [ -f "$name/SKILL.md" ]; then
              zip -r "$name.zip" "$name/"
            fi
          done
          gh release upload "${{ steps.release.outputs.tag_name }}" *.zip
