name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update README skills table
        run: node .dev/scripts/update-readme.mjs

      - name: Bump patch version
        id: version
        run: |
          npm version patch --no-git-tag-version
          echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit version bump and README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json README.md
          git commit -m "chore: release v${{ steps.version.outputs.value }} [skip ci]"
          git push

      - name: Zip skills
        run: |
          for dir in */; do
            name="${dir%/}"
            if [ -f "$name/SKILL.md" ]; then
              zip -r "$name.zip" "$name/"
            fi
          done

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.value }}" \
            --title "v${{ steps.version.outputs.value }}" \
            --generate-notes \
            *.zip
